name: AURA Tech CI/CD Pipeline

on:
  push:
    branches: [ "main", "master", "rotha" ]
  pull_request:
    branches: [ "main", "master", "rotha" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # 1. Verification and Static Code Analysis
  verify:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: HTML Linting Check
        run: |
          echo "Starting HTML validations..."
          if [ ! -s index.html ]; then echo "Error: index.html is empty or missing!"; exit 1; fi
          echo "HTML validation succeeded!"

      - name: CSS Linting Check
        run: |
          echo "Starting CSS validations..."
          if [ ! -s style.css ]; then echo "Error: style.css is empty or missing!"; exit 1; fi
          echo "CSS validation succeeded!"

      - name: Javascript Linting Check
        run: |
          echo "Starting Javascript validations..."
          if [ ! -s app.js ]; then echo "Error: app.js is empty or missing!"; exit 1; fi
          node -e "try { require('fs').readFileSync('app.js', 'utf8'); console.log('Syntax check passed'); } catch(e) { console.error(e); process.exit(1); }"

  # 2. Build and Publish Docker Container
  build-and-push:
    name: Build & Push Docker Image
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU (for multi-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/rotha' }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 3. Deploy to Operations Server (Machine 2)
  deploy:
    name: Production Deploy to Machine 2
    needs: build-and-push
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/rotha'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Machine 2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        continue-on-error: true
        with:
          host: ${{ secrets.DEPLOY_SERVER_IP }}
          username: ${{ secrets.DEPLOY_SERVER_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script: |
            echo "Logging in to GitHub Container Registry..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "Pulling latest image..."
            docker pull ghcr.io/${{ github.repository }}:latest

            echo "Stopping old container..."
            docker stop aura-shop-web || true
            docker rm aura-shop-web || true

            echo "Starting new container on port 1111..."
            docker run -d \
              --name aura-shop-web \
              -p 1111:80 \
              --restart always \
              ghcr.io/${{ github.repository }}:latest

            echo "Deployment complete! AURA Tech shop is live!"
